<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Eco Conditional | Flip, Write & Speak</title>
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', 'Comic Neue', sans-serif;
            background: linear-gradient(145deg, #1b6b2b 0%, #0e4a1f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('background.png') center center / cover no-repeat fixed;
            filter: brightness(0.7);
            z-index: -2;
            opacity: 0.9;
        }
        body::after {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 30, 15, 0.5);
            z-index: -1;
        }
        .game-container {
            max-width: 1100px;
            width: 100%;
            background: rgba(255, 253, 240, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 65px;
            box-shadow: 0 25px 40px rgba(0,0,0,0.3), 0 0 0 6px #f9d67a, 0 0 0 12px #2c6e2c;
            overflow: hidden;
        }
        .header {
            background: linear-gradient(135deg, #ffb347, #ff7e05);
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid #e68900;
        }
        .header h1 {
            font-size: 2rem;
            color: #1e3a1e;
            text-shadow: 2px 2px 0 #ffde9c;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        .sub {
            background: #fae67a;
            display: inline-block;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }
        /* навигация */
        .nav-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 20px 0;
            gap: 15px;
            flex-wrap: wrap;
        }
        .card-counter {
            background: #d97c15;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .nav-buttons {
            display: flex;
            gap: 12px;
        }
        .nav-btn {
            background: #ffb347;
            border: none;
            font-size: 1.2rem;
            font-weight: bold;
            padding: 8px 18px;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 0 #a15717;
            transition: 0.05s linear;
            color: #2d1f0f;
        }
        .nav-btn:active {
            transform: translateY(2px);
            box-shadow: 0 1px 0 #a15717;
        }
        /* КАРТОЧКА – ОЧЕНЬ БОЛЬШАЯ */
        .flip-card {
            background: transparent;
            width: calc(100% - 40px);
            height: 550px;
            margin: 15px 20px 10px;
            perspective: 1800px;
            cursor: pointer;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
            transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1);
            transform-style: preserve-3d;
            border-radius: 55px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.3);
        }
        .flip-card.flipped .flip-card-inner {
            transform: rotateY(180deg);
        }
        .flip-front, .flip-back {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 55px;
            overflow: hidden;
        }
        .flip-front {
            background: #feffea;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 4px solid #ffd966;
        }
        .flip-back {
            background: url('badgers_bg.png') center/cover no-repeat;
            background-color: rgba(30, 60, 30, 0.85);
            background-blend-mode: overlay;
            transform: rotateY(180deg);
            display: flex;
            flex-direction: column;
            padding: 25px;
            color: #fff;
            text-shadow: 1px 1px 0 #1f3b1f;
            overflow-y: auto;
        }
        .flip-back.no-bg {
            background: #2d5e2d;
        }
        .card-img {
            width: 100%;
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 5px;
        }
        .card-img img {
            max-width: 95%;
            max-height: 380px;
            object-fit: contain;
            border-radius: 35px;
            background: #fff2df;
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }
        .placeholder-img {
            background: #c8e6c9;
            width: 90%;
            height: 280px;
            border-radius: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: #2e7d32;
            font-weight: bold;
        }
        .flip-hint {
            margin-top: 15px;
            font-size: 1rem;
            background: #fff0c0;
            padding: 8px 20px;
            border-radius: 50px;
            color: #b45f1b;
            font-weight: 600;
        }
        /* примеры на обороте */
        .examples-title {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 18px;
            background: rgba(0,0,0,0.4);
            display: inline-block;
            padding: 6px 22px;
            border-radius: 50px;
            align-self: flex-start;
        }
        .examples-list {
            width: 100%;
            margin-top: 8px;
        }
        .example-item {
            background: rgba(255,255,220,0.95);
            border-radius: 45px;
            padding: 15px 20px;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
            color: #1f3b1f;
            text-shadow: none;
            backdrop-filter: blur(2px);
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .example-text {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
            line-height: 1.4;
        }
        .speak-btn {
            background: #ffb347;
            border: none;
            border-radius: 50px;
            padding: 8px 18px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            color: #2c2c2c;
            transition: 0.1s;
            box-shadow: 0 3px 0 #a15717;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .speak-btn:active {
            transform: translateY(2px);
            box-shadow: none;
        }
        /* поле для ввода */
        .write-area {
            margin: 15px 20px 10px;
        }
        .write-label {
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c5e2c;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
        }
        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 45px;
            border: 2px solid #ffd966;
            background: #fffef7;
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            outline: none;
        }
        textarea:focus {
            border-color: #f39c12;
            box-shadow: 0 0 0 3px #ffe0a3;
        }
        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin: 10px 20px 25px;
        }
        .action-btn {
            background: #4caf50;
            border: none;
            padding: 12px 32px;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 4px 0 #2c6e2c;
            font-size: 1.1rem;
        }
        .action-btn:active {
            transform: translateY(2px);
        }
        .footer {
            text-align: center;
            font-size: 0.85rem;
            padding: 15px;
            color: #2e4a1e;
            font-weight: 500;
        }
        @media (max-width: 680px) {
            .flip-card { height: 480px; }
            .card-img img { max-height: 280px; }
            .example-text { font-size: 0.85rem; }
            .speak-btn { padding: 5px 12px; font-size: 0.8rem; }
            .action-btn { padding: 8px 20px; font-size: 0.9rem; }
            .examples-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <h1><i class="fas fa-leaf"></i> First Conditional <i class="fas fa-recycle"></i></h1>
        <div class="sub">Tap card to flip | Write your own sentence | Use ← → arrows</div>
    </div>

    <div class="nav-area">
        <div class="card-counter" id="cardCounter">Card 1 / 9</div>
        <div class="nav-buttons">
            <button class="nav-btn" id="prevBtn"><i class="fas fa-arrow-left"></i> Prev</button>
            <button class="nav-btn" id="nextBtn">Next <i class="fas fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- Flip card -->
    <div class="flip-card" id="flipCard">
        <div class="flip-card-inner">
            <div class="flip-front">
                <div class="card-img" id="imageContainer">
                    <img id="mainImage" src="1.png" alt="Eco scenario" onerror="this.onerror=null; this.parentElement.innerHTML='<div class=\'placeholder-img\'><i class=\'fas fa-image\'></i><br>Image missing</div>'">
                </div>
                <div class="flip-hint"><i class="fas fa-arrows-spin"></i> Tap or click "Flip" to see examples</div>
            </div>
            <div class="flip-back" id="backSide">
                <div class="examples-title"><i class="fas fa-lightbulb"></i> Example sentences</div>
                <div id="examplesList" class="examples-list"></div>
            </div>
        </div>
    </div>

    <!-- Поле для собственного предложения -->
    <div class="write-area">
        <div class="write-label"><i class="fas fa-pen-fancy"></i> Your First Conditional sentence:</div>
        <textarea id="userSentence" rows="2" placeholder="e.g. If we recycle more, the planet will be cleaner..."></textarea>
    </div>
    <div class="action-buttons">
        <button class="action-btn" id="flipBtn"><i class="fas fa-sync-alt"></i> Flip card</button>
        <button class="action-btn" id="speakMyBtn"><i class="fas fa-volume-up"></i> Speak my sentence</button>
    </div>
    <div class="footer">
        🌿 Click 🔊 to hear example sentences. Write your own idea and listen to it. Use ← → keys to change cards.
    </div>
</div>

<script>
    const cardsData = [
        { img: "1.png", examples: ["If we recycle plastic waste, the park will stay clean and beautiful.", "If everyone puts rubbish in the recycling bin, nature won't be polluted.", "When we throw away less plastic, green areas become healthier."] },
        { img: "2.png", examples: ["If we stop throwing waste into the ocean, the water will be clean again.", "Unless we reduce ocean pollution, marine life will be in danger.", "If people collect plastic from the sea, sea animals may survive."] },
        { img: "3.png", examples: ["If we stop climate change, polar bears won't lose their icy home.", "Unless we reduce emissions, polar bears could become extinct.", "If the ice doesn't melt, polar bears will have enough space to live."] },
        { img: "4.png", examples: ["If we stop cutting down forests, trees will produce enough oxygen.", "Unless we protect the rainforest, the air will get worse.", "If we plant more trees, we might reduce CO₂ levels."] },
        { img: "5.png", examples: ["If we recycle plastic, turtles will be safe and the beach will be clean.", "When people use less plastic, marine animals won't eat it.", "If we put rubbish in bins, the ocean will be plastic-free."] },
        { img: "6.png", examples: ["If we use solar power, global warming may slow down.", "If factories reduce smoke, the climate won't get so hot.", "When we choose renewable energy, polar bears have a better future."] },
        { img: "7.png", examples: ["If we stop deforestation, tigers will not lose their home.", "Unless we protect forests, tigers may become extinct.", "If people create wildlife reserves, tiger populations will recover."] },
        { img: "8.png", examples: ["If we save energy, we will reduce pollution and help the planet.", "When you turn off lights, less electricity is wasted.", "If everyone uses energy efficiently, climate change might get better."] },
        { img: "9.png", examples: ["If we drive less, air pollution will decrease.", "Unless we use public transport more, the air may stay dirty.", "If people cycle instead of driving, cities will be cleaner and healthier."] }
    ];

    let currentIndex = 0;
    let isFlipped = false;
    let userSentences = new Array(9).fill("");

    const flipCardDiv = document.getElementById("flipCard");
    const mainImage = document.getElementById("mainImage");
    const imageContainer = document.getElementById("imageContainer");
    const examplesListDiv = document.getElementById("examplesList");
    const userSentenceTextarea = document.getElementById("userSentence");
    const prevBtn = document.getElementById("prevBtn");
    const nextBtn = document.getElementById("nextBtn");
    const flipBtn = document.getElementById("flipBtn");
    const speakMyBtn = document.getElementById("speakMyBtn");
    const cardCounterSpan = document.getElementById("cardCounter");
    const backSide = document.getElementById("backSide");

    // фон для обратной стороны
    const bgTest = new Image();
    bgTest.src = 'badgers_bg.png';
    bgTest.onload = () => { backSide.style.backgroundImage = "url('badgers_bg.png')"; backSide.style.backgroundBlendMode = "overlay"; };
    bgTest.onerror = () => backSide.classList.add('no-bg');

    function speakText(text) {
        if (!text || text.trim() === "") return;
        if (window.speechSynthesis.speaking) window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.lang = "en-US";
        utterance.rate = 0.9;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    function renderExamples(examples) {
        examplesListDiv.innerHTML = "";
        examples.forEach(example => {
            const div = document.createElement("div");
            div.className = "example-item";
            div.innerHTML = `<span class="example-text">${example}</span><button class="speak-btn"><i class="fas fa-volume-up"></i> Speak</button>`;
            div.querySelector(".speak-btn").addEventListener("click", (e) => {
                e.stopPropagation();
                speakText(example);
            });
            examplesListDiv.appendChild(div);
        });
    }

    function updateCard() {
        const card = cardsData[currentIndex];
        mainImage.src = card.img;
        mainImage.onerror = () => { imageContainer.innerHTML = '<div class="placeholder-img"><i class="fas fa-image"></i><br>Image not found</div>'; };
        mainImage.onload = () => { if (imageContainer.children[0]?.classList?.contains('placeholder-img')) { imageContainer.innerHTML = ""; imageContainer.appendChild(mainImage); } };
        if (mainImage.complete && mainImage.naturalHeight === 0) mainImage.onerror();
        renderExamples(card.examples);
        cardCounterSpan.textContent = `Card ${currentIndex+1} / ${cardsData.length}`;
        userSentenceTextarea.value = userSentences[currentIndex];
        if (isFlipped) { flipCardDiv.classList.remove("flipped"); isFlipped = false; }
        localStorage.setItem("ecoCurrentCard", currentIndex);
    }

    function saveCurrentSentence() {
        userSentences[currentIndex] = userSentenceTextarea.value;
        localStorage.setItem("ecoUserSentences", JSON.stringify(userSentences));
    }

    function toggleFlip() {
        isFlipped ? flipCardDiv.classList.remove("flipped") : flipCardDiv.classList.add("flipped");
        isFlipped = !isFlipped;
    }

    function nextCard() {
        if (currentIndex < cardsData.length - 1) { saveCurrentSentence(); currentIndex++; updateCard(); }
        else alert("🎉 You've completed all cards! Great job! 🌍");
    }
    function prevCard() {
        if (currentIndex > 0) { saveCurrentSentence(); currentIndex--; updateCard(); }
    }
    function speakMySentence() {
        const txt = userSentenceTextarea.value.trim();
        txt ? speakText(txt) : speakText("Please write your First Conditional sentence first.");
    }

    flipCardDiv.addEventListener("click", toggleFlip);
    flipBtn.addEventListener("click", toggleFlip);
    prevBtn.addEventListener("click", prevCard);
    nextBtn.addEventListener("click", nextCard);
    speakMyBtn.addEventListener("click", speakMySentence);
    userSentenceTextarea.addEventListener("input", () => { userSentences[currentIndex] = userSentenceTextarea.value; localStorage.setItem("ecoUserSentences", JSON.stringify(userSentences)); });

    window.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") { e.preventDefault(); prevCard(); }
        else if (e.key === "ArrowRight") { e.preventDefault(); nextCard(); }
    });

    const savedSentences = localStorage.getItem("ecoUserSentences");
    if (savedSentences) { try { const parsed = JSON.parse(savedSentences); if (Array.isArray(parsed) && parsed.length === cardsData.length) userSentences = parsed; } catch(e) {} }
    const savedCard = localStorage.getItem("ecoCurrentCard");
    if (savedCard && !isNaN(parseInt(savedCard))) { let idx = parseInt(savedCard); if (idx >= 0 && idx < cardsData.length) currentIndex = idx; }
    updateCard();
</script>
</body>
</html>
